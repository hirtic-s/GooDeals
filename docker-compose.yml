services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goodeal_db
      POSTGRES_USER: hirticc
      POSTGRES_PASSWORD: goodeal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hirticc -d goodeal_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build: ./scraper-service
    ports:
      - "8000:8000"

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/goodeal_db
      SPRING_DATASOURCE_USERNAME: hirticc
      SPRING_DATASOURCE_PASSWORD: goodeal
      GOODEAL_SCRAPER_SERVICE_URL: http://scraper:8000
    depends_on:
      db:
        condition: service_healthy
      scraper:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
