# ===========================================================================
# GooDeals — Application Configuration
# ===========================================================================

spring.application.name=GooDeals

# ---------------------------------------------------------------------------
# DataSource — PostgreSQL
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/goodeal_db
spring.datasource.username=hirticc
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=GooDealsHikariPool

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=8080
server.error.include-message=always

# ---------------------------------------------------------------------------
# GooDeals Scraper Settings
# ---------------------------------------------------------------------------
# URL of the Python Scrapling microservice
goodeal.scraper.service-url=http://localhost:8000

# HTTP timeout for calls to the scraper service (ms) — allow time for Scrapling
goodeal.scraper.timeout-ms=60000

# Maximum number of results to request per store per query
goodeal.scraper.max-results=25

# ---------------------------------------------------------------------------
# Gemini AI
# ---------------------------------------------------------------------------
goodeal.gemini.api-key=${GEMINI_API_KEY}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.com.goodeal=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
